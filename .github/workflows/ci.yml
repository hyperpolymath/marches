name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: leanprover/lean-action@v1
      - name: No sorries
        run: "! grep -rn 'sorry' Marches/ Marches.lean"
